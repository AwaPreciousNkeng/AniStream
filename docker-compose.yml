services:
  postgres:
    image: postgres
    container_name: aniStream_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pcodes
      POSTGRES_PASSWORD: pcodes
      POSTGRES_DB: aniStream_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcodes -d aniStream_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis
    container_name: aniStream_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  redis_data: